name: container-scan
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docker/**"
      - "infrastructure/kubernetes/**"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy image scan (placeholder image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: quant-system/web-control-plane:placeholder
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
