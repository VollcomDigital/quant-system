name: model-deployment
on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Model id"
        required: true
      version:
        description: "Model version"
        required: true
      target_stage:
        description: "Target stage (production | archived)"
        required: true
        default: production

permissions:
  contents: read
  id-token: write  # required for KMS / OIDC federation with MLflow

jobs:
  model-registry-gate:
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pydantic
      - name: ModelRegistry promotion gate
        run: |
          python - <<'PY'
          # Gate: the alpha_research.ml_models.registry.ModelRegistry
          # must have an approved record for (model_id, version) before
          # Phase 9 model_deployment promotes it. MLflow metadata sync
          # happens in the Phase 9 registry backend.
          import sys
          from alpha_research.ml_models.registry import ModelRegistry
          reg = ModelRegistry()
          # In the real workflow, `reg` is seeded from the MLflow /
          # W&B backend before this step runs.
          try:
              reg.get(model_id="${{ inputs.model_id }}", version="${{ inputs.version }}")
          except LookupError as exc:
              print(f"::error::{exc}")
              sys.exit(1)
          PY
