metric: sortino  # sharpe | sortino | profit
engine: pybroker  # single engine for simulations and param sweeps
param_search: grid  # grid | optuna
param_trials: 25
asset_workers: 4
param_workers: 2
max_fetch_concurrency: 2
fees: 0.0005
slippage: 0.0005
risk_free_rate: 0.0
cache_dir: .cache/data

# Optional validation policy
validation:
  # You can keep only `data_quality`, only `optimization`, or both.
  data_quality:
    min_data_points: 1000
    continuity:
      min_score: 0.98
      max_missing_bar_pct: 5.0  # max percent of missing bars vs expected timeline
      calendar:
        kind: auto  # auto | crypto_24_7 | weekday | exchange
        # exchange: XNYS
        # timezone: UTC-05:00
    kurtosis: 10.0  # max allowed kurtosis of close-to-close returns
    outlier_detection:
      max_outlier_pct: 2.0  # max percent of return bars flagged as outliers
      method: modified_zscore  # zscore | modified_zscore
      zscore_threshold: 3.5  # required threshold for selected method
    on_fail: skip_job  # skip_optimization | skip_job | skip_collection
  # Optional strategy-level optimization feasibility policy.
  optimization:
    on_fail: baseline_only  # baseline_only | skip_job
    min_bars: 2000
    dof_multiplier: 100

collections:
  # Stocks (large-cap growth)
  - name: stocks_large_cap_growth
    source: yfinance
    symbols: ["CNDX.L", "AAPL", "MSFT", "NVDA"]
    fees: 0.0005  # approx IBKR
    slippage: 0.0005

  # Bonds (global aggregate)
  - name: bonds_global
    source: yfinance
    symbols: ["AGGH.L", "VAGP.L", "IGLA.L"]
    fees: 0.0005
    slippage: 0.0005

  # Commodities (ETC mix)
  - name: commodities
    source: yfinance
    symbols: ["SGLN.L", "PHAG.L", "CRUD.L", "CMOD.L"]
    fees: 0.0005
    slippage: 0.0005

  # Crypto (Binance via ccxt)
  - name: crypto
    source: binance
    exchange: binance
    quote: USDT
    symbols: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT"]
    fees: 0.0006  # approx Bybit/Binance taker
    slippage: 0.0005
    # Optional per-collection validation override (falls back to global settings above).
    # validation:
    #   data_quality:
    #     min_data_points: 1500
    #     continuity:
    #       min_score: 0.99
    #       max_missing_bar_pct: 2.0
    #     kurtosis: 8.0
    #     outlier_detection:
    #       max_outlier_pct: 1.0
    #       method: modified_zscore
    #       zscore_threshold: 3.5
    #     on_fail: skip_optimization

# Choose timeframes compatible across sources for full history
timeframes: ["1d"]

strategies:
  # Example: replace with your external strategy name and optionally module/class.
  # If module/class are omitted, loader tries to find a BaseStrategy subclass matching `name`.
  # Replace placeholders with your external strategy names and optional module/class.
  - name: YourStrategyName
    # module: your_package.module
    # class: YourStrategyClass
    params: {}
  # - name: AnotherStrategy
  #   module: your_package.other_module
  #   class: AnotherStrategyClass
  #   params: {}
